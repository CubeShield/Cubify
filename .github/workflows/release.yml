name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: linux/amd64
                      os: ubuntu-latest
                      artifact: Cubify-linux-amd64
                    - platform: windows/amd64
                      os: windows-latest
                      artifact: Cubify-windows-amd64.exe
                    - platform: darwin/universal
                      os: macos-latest
                      artifact: Cubify-macos-universal.app

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.23"
                  cache: true

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            # Linux dependencies
            - name: Install Linux deps
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

            # Install Wails CLI
            - name: Install Wails
              run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

            # Build
            - name: Build (Linux)
              if: runner.os == 'Linux'
              run: wails build -platform ${{ matrix.platform }} -o Cubify

            - name: Build (Windows)
              if: runner.os == 'Windows'
              run: wails build -platform ${{ matrix.platform }} -o Cubify.exe

            - name: Build (macOS)
              if: runner.os == 'macOS'
              run: wails build -platform ${{ matrix.platform }}

            # Prepare artifacts
            - name: Prepare Linux artifact
              if: runner.os == 'Linux'
              run: |
                  mv build/bin/Cubify ${{ matrix.artifact }}

            - name: Prepare Windows artifact
              if: runner.os == 'Windows'
              run: |
                  move build\bin\Cubify.exe ${{ matrix.artifact }}

            - name: Prepare macOS artifact
              if: runner.os == 'macOS'
              run: |
                  cd build/bin
                  zip -r ../../${{ matrix.artifact }}.zip Cubify.app
                  cd ../..

            # Upload
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: |
                      ${{ matrix.artifact }}
                      ${{ matrix.artifact }}.zip

    release:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: List artifacts
              run: ls -lR dist/

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: |
                      dist/Cubify-linux-amd64
                      dist/Cubify-windows-amd64.exe
                      dist/Cubify-macos-universal.app.zip
